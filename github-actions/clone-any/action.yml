name: "Clone GitHub Repo Action"

description: "Clone GitHub repository in GitHub Actions using actions/checkout@v6"

inputs:
  repository:
    description: "Repository name (format: owner/repo)"
    required: true
  access_token:
    description: "Access token for private repositories"
    required: false
  ssh_key:
    description: "SSH private key"
    required: false
  ssh_host:
    description: "SSH server host for known_hosts (default: github.com)"
    required: false
    default: "github.com"
  ref:
    description: "Git ref (branch/tag/commit)"
    required: false
  ref_file:
    description: "Read ref from a file"
    required: false

runs:
  using: "composite"
  steps:
    # Step 1: Read ref from file if ref_file is provided
    - name: Read ref from file
      if: inputs.ref_file != ''
      shell: bash
      id: read_ref
      run: |
        REF_VALUE=$(cat "${{ inputs.ref_file }}")
        echo "ref_value=${REF_VALUE}" >> $GITHUB_OUTPUT
        echo "Read ref from file: ${REF_VALUE}"

    # Step 2: Backup existing files to __origin__
    - name: Backup existing files
      shell: bash
      run: |
        set -x
        # Remove existing .git if present
        rm -rf .git

        # Create backup directory and move everything except itself
        echo '/*' > .gitignore
        mkdir -p __origin__

        # Move all files and directories to __origin__ except __origin__ itself
        find . -maxdepth 1 ! -path './__origin__' ! -path '.' -exec mv {} __origin__/ \; 2>/dev/null || true

        echo "Existing files backed up to __origin__/"

    # Step 3: Clone repository using actions/checkout@v6
    - name: Clone repository
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref != '' && inputs.ref || steps.read_ref.outputs.ref_value }}
        token: ${{ inputs.ssh_key == '' && inputs.access_token || '' }}
        ssh-key: ${{ inputs.ssh_key }}
        ssh-known-hosts: ${{ inputs.ssh_key != '' && inputs.ssh_host || '' }}
        path: "."
        fetch-depth: 0

    # Step 4: Configure git safe directories
    - name: Configure git safe directories
      shell: bash
      run: |
        git config --global --add safe.directory ${{ github.workspace }}
        git config --global --add safe.directory ${{ github.action_path }}
        git config --global --add safe.directory ${GITHUB_ACTION_PATH}

        if [ -d "/__w" ]; then
          PROJECT_NAME=${GITHUB_REPOSITORY#*/}
          git config --global --add safe.directory /__w/${PROJECT_NAME}/${PROJECT_NAME}
        fi

        echo "Cloned ${{ inputs.repository }} repository successfully."
