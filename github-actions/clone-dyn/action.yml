name: "Clone Dynmatic Git Repo Action"

description: "Clone any git repository in Github Actions for dyn-actions"

inputs:
  repository:
    description: "Repository"
    required: true
  token:
    description: "Github token"
    required: false
  # target:
  #   description: "Clone target dir name"
  #   required: false
  ref:
    description: "Git ref"
    required: false
  ref_file:
    description: "Read ref from a file"
    required: false
  submodules:
    description: "Whether to checkout submodules: `true` to checkout submodules or `recursive` to recursively checkout submodules"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Prepare Options
      shell: bash
      id: prepare_options
      run: |
        set -xe
        GIT_REF=${{ inputs.ref }}
        GIT_REF_FILE=${{ inputs.ref_file }}

        if [ -z "${GIT_REF}" ]; then
          GIT_REF=$(cat ${GIT_REF_FILE})
        fi

        echo "GIT_REF=$GIT_REF" >> $GITHUB_OUTPUT

    - name: Prepare Git Repository
      shell: bash
      run: |
        set -x
        # Remove existing .git if present
        rm -rf .git

        # Create backup directory and move everything to __origin__
        echo '/*' > .gitignore
        mkdir -p __origin__
        find . -maxdepth 1 ! -path './__origin__' ! -path '.' -exec mv {} __origin__/ \; 2>/dev/null || true

        # Move __origin__ to temp location outside current directory to make it truly empty
        TEMP_BACKUP="${RUNNER_TEMP:-/tmp}/clone_dyn_backup_$$"
        mkdir -p "$TEMP_BACKUP"
        mv __origin__ "$TEMP_BACKUP/"

        echo "TEMP_BACKUP=$TEMP_BACKUP" >> $GITHUB_ENV
        echo "Backed up files to $TEMP_BACKUP/__origin__"

    - uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ steps.prepare_options.outputs.GIT_REF }}
        token: ${{ inputs.token }}
        path: "."
        fetch-depth: 0
        submodules: ${{ inputs.submodules }}

    - name: Verify and initialize submodules
      if: inputs.submodules != 'false'
      shell: bash
      run: |
        set -x

        echo "Checking submodules status..."
        if [ -f ".gitmodules" ]; then
          cat .gitmodules

          echo "Current submodule status:"
          git submodule status || true

          echo "Initializing and updating submodules..."
          git submodule sync --recursive
          git submodule update --init --recursive --force

          echo "Final submodule status:"
          git submodule status

          echo "Listing submodule directories:"
          git submodule foreach --recursive 'echo "Submodule: $name at $sm_path" && ls -la'
        else
          echo "No .gitmodules file found"
        fi

    - name: Restore backup directory
      shell: bash
      run: |
        set -x
        # Move __origin__ back to workspace
        if [ -d "$TEMP_BACKUP/__origin__" ]; then
          mv "$TEMP_BACKUP/__origin__" .
          rm -rf "$TEMP_BACKUP"
          echo "Restored __origin__ directory"
        fi

        # Configure git safe directories
        git config --global --add safe.directory ${{ github.workspace }}
        git config --global --add safe.directory ${{ github.action_path }}
        git config --global --add safe.directory ${GITHUB_ACTION_PATH}
        if [ -d "/__w" ]; then
          PROJECT_NAME=${GITHUB_REPOSITORY#*/}
          git config --global --add safe.directory /__w/${PROJECT_NAME}/${PROJECT_NAME}
        fi

        echo "Cloned ${{ inputs.repository }} repository successfully."
