replicaCount: 1

image:
  repository: docker.io/vanjayak/open-design
  pullPolicy: IfNotPresent
  digest: ""
  tag: "latest"

agent:
  codex: false
  installPath: /opt/opendesign-agents
  home: /app/.od/home
  codexPackage: "@openai/codex"
  codexVersion: "0.130.0"
  codexBypassSandbox: true
  installerImage:
    repository: docker.io/library/node
    pullPolicy: IfNotPresent
    tag: "24-alpine"

agents: []

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 7456

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: opendesign.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

env:
  NODE_ENV: production
  NODE_OPTIONS: "--max-old-space-size=192"
  OD_BIND_HOST: "0.0.0.0"
  OD_PORT: "7456"
  OD_WEB_PORT: "7456"
  OD_ALLOWED_ORIGINS: "https://opendesign.kahub.in"

extraEnv: []
extraEnvFrom: []

persistence:
  enabled: true
  storageClassName: longhorn
  accessModes:
    - ReadWriteOnce
  size: 10Gi
  mountPath: /app/.od
  existingClaim: ""

tmpfs:
  enabled: true
  mountPath: /tmp

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 20
  timeoutSeconds: 5
  failureThreshold: 6

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
