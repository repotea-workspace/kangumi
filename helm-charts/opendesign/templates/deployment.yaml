apiVersion: apps/v1
kind: Deployment
{{- $agents := .Values.agents | default list }}
{{- $legacyCodex := .Values.agent.codex | default false }}
{{- $hasAgentInstallers := or $legacyCodex (gt (len $agents) 0) }}
metadata:
  name: {{ include "opendesign.fullname" . }}
  labels:
    {{- include "opendesign.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "opendesign.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "opendesign.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "opendesign.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- if $hasAgentInstallers }}
      initContainers:
        {{- if $legacyCodex }}
        - name: install-codex
          image: "{{ include "opendesign.agentInstallerImage" . }}"
          imagePullPolicy: {{ .Values.agent.installerImage.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              npm install --prefix {{ .Values.agent.installPath | quote }} {{ printf "%s@%s" .Values.agent.codexPackage .Values.agent.codexVersion | quote }}
              mkdir -p {{ printf "%s/bin" .Values.agent.installPath | quote }}
              ln -sf ../node_modules/.bin/codex {{ printf "%s/bin/codex-real" .Values.agent.installPath | quote }}
              printf '%s\n' \
                '#!/bin/sh' \
                'set -e' \
                'self_dir="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"' \
                'if [ "$1" = "exec" ] && [ "${CODEX_BYPASS_SANDBOX:-false}" = "true" ]; then' \
                '  exec "$self_dir/codex-real" "$@" --dangerously-bypass-approvals-and-sandbox' \
                'fi' \
                'exec "$self_dir/codex-real" "$@"' \
                > {{ printf "%s/bin/codex" .Values.agent.installPath | quote }}
              chmod +x {{ printf "%s/bin/codex" .Values.agent.installPath | quote }}
              {{ printf "%s/bin/codex" .Values.agent.installPath | quote }} --version
          volumeMounts:
            - name: agents
              mountPath: {{ .Values.agent.installPath }}
        {{- end }}
        {{- range $index, $agent := $agents }}
        {{- if eq $agent.type "codex" }}
        {{- $installPath := default "/opt/opendesign-agents/codex" $agent.installPath }}
        {{- $installerImage := default "docker.io/library/node:24-alpine" $agent.installerImage }}
        {{- $pullPolicy := default "IfNotPresent" $agent.pullPolicy }}
        {{- $package := default "@openai/codex" $agent.package }}
        {{- $version := default "0.130.0" $agent.version }}
        {{- $bypassSandbox := default true $agent.bypassSandbox }}
        - name: {{ printf "install-codex-%d" $index }}
          image: {{ $installerImage | quote }}
          imagePullPolicy: {{ $pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              npm install --prefix {{ $installPath | quote }} {{ printf "%s@%s" $package $version | quote }}
              mkdir -p {{ printf "%s/bin" $installPath | quote }}
              ln -sf ../node_modules/.bin/codex {{ printf "%s/bin/codex-real" $installPath | quote }}
              printf '%s\n' \
                '#!/bin/sh' \
                'set -e' \
                'self_dir="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"' \
                'if [ "$1" = "exec" ] && [ "${CODEX_BYPASS_SANDBOX:-false}" = "true" ]; then' \
                '  exec "$self_dir/codex-real" "$@" --dangerously-bypass-approvals-and-sandbox' \
                'fi' \
                'exec "$self_dir/codex-real" "$@"' \
                > {{ printf "%s/bin/codex" $installPath | quote }}
              chmod +x {{ printf "%s/bin/codex" $installPath | quote }}
              {{ printf "%s/bin/codex" $installPath | quote }} --version
          volumeMounts:
            - name: agents
              mountPath: {{ default "/opt/opendesign-agents" $agent.volumeMountPath }}
        {{- end }}
        {{- if eq $agent.type "agent-browser" }}
        {{- $installPath := default "/opt/opendesign-agents/agent-browser" $agent.installPath }}
        {{- $installerImage := default "docker.io/library/node:24-alpine" $agent.installerImage }}
        {{- $pullPolicy := default "IfNotPresent" $agent.pullPolicy }}
        {{- $package := default "agent-browser" $agent.package }}
        {{- $version := default "0.27.0" $agent.version }}
        - name: {{ printf "install-agent-browser-%d" $index }}
          image: {{ $installerImage | quote }}
          imagePullPolicy: {{ $pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              npm install --prefix {{ $installPath | quote }} {{ printf "%s@%s" $package $version | quote }}
              {{ printf "%s/node_modules/.bin/agent-browser" $installPath | quote }} --version
          volumeMounts:
            - name: agents
              mountPath: {{ default "/opt/opendesign-agents" $agent.volumeMountPath }}
        {{- end }}
        {{- end }}
      {{- end }}
      containers:
        - name: opendesign
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ include "opendesign.image" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            {{- range $k, $v := .Values.env }}
            {{- if and (kindIs "map" $v) (hasKey $v "secretName") (hasKey $v "secretKey") }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ $v.secretName }}
                  key: {{ $v.secretKey }}
            {{- else }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- if $legacyCodex }}
            - name: PATH
              value: {{ printf "%s/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" .Values.agent.installPath | quote }}
            - name: HOME
              value: {{ .Values.agent.home | quote }}
            - name: CODEX_BYPASS_SANDBOX
              value: {{ .Values.agent.codexBypassSandbox | quote }}
            {{- end }}
            {{- range $agent := $agents }}
            {{- if eq $agent.type "codex" }}
            {{- $installPath := default "/opt/opendesign-agents/codex" $agent.installPath }}
            {{- $home := default "/app/.od/agents/codex" $agent.home }}
            {{- $bypassSandbox := default true $agent.bypassSandbox }}
            - name: PATH
              value: {{ printf "%s/bin:/opt/opendesign-agents/agent-browser/node_modules/.bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin" $installPath | quote }}
            - name: HOME
              value: {{ $home | quote }}
            - name: CODEX_BYPASS_SANDBOX
              value: {{ $bypassSandbox | quote }}
            {{- end }}
            {{- if eq $agent.type "agent-browser" }}
            {{- $home := default "/app/.od/agents/agent-browser" $agent.home }}
            - name: AGENT_BROWSER_HOME
              value: {{ $home | quote }}
            - name: AGENT_BROWSER_AUTO_CONNECT
              value: "1"
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            {{- if .Values.persistence.enabled }}
            - name: storage
              mountPath: {{ .Values.persistence.mountPath }}
            {{- end }}
            {{- if .Values.tmpfs.enabled }}
            - name: tmp
              mountPath: {{ .Values.tmpfs.mountPath }}
            {{- end }}
            {{- if $hasAgentInstallers }}
            - name: agents
              mountPath: /opt/opendesign-agents
              readOnly: true
            {{- end }}
        {{- range $agent := $agents }}
        {{- if eq $agent.type "agent-browser" }}
        {{- $browserImage := default "mcr.microsoft.com/playwright:v1.57.0-noble" $agent.browserImage }}
        {{- $browserPullPolicy := default "IfNotPresent" $agent.browserPullPolicy }}
        - name: agent-browser-chrome
          image: {{ $browserImage | quote }}
          imagePullPolicy: {{ $browserPullPolicy }}
          command:
            - /bin/sh
            - -ec
            - |
              chrome="$(find /ms-playwright -path '*/chrome-linux*/chrome' -type f | head -1)"
              exec "$chrome" \
                --headless=new \
                --no-sandbox \
                --disable-dev-shm-usage \
                --remote-debugging-address=0.0.0.0 \
                --remote-debugging-port=9223 \
                about:blank
          ports:
            - name: cdp
              containerPort: 9223
              protocol: TCP
        {{- end }}
        {{- end }}
      volumes:
        {{- if .Values.persistence.enabled }}
        - name: storage
          persistentVolumeClaim:
            claimName: {{ include "opendesign.claimName" . }}
        {{- end }}
        {{- if .Values.tmpfs.enabled }}
        - name: tmp
          emptyDir: {}
        {{- end }}
        {{- if $hasAgentInstallers }}
        - name: agents
          emptyDir: {}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
