{{- if eq (include "mem0-mcp.authProxyEnabled" .) "true" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mem0-mcp.fullname" . }}-auth-proxy
  labels:
    {{- include "mem0-mcp.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
      listen {{ .Values.authProxy.port }};
      server_name _;

      location / {
        if ($arg_{{ .Values.ingress.auth.queryParamName | lower | replace "-" "_" }} != {{ .Values.ingress.auth.token | quote }}) {
          return 401;
        }

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:{{ .Values.service.port }};
      }
    }
{{- end }}
