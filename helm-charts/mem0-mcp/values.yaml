# Default values for mem0-mcp.

replicaCount: 1

image:
  repository: ghcr.io/repotea-workspace/kangumi/mem0-mcp
  pullPolicy: IfNotPresent
  digest: ""
  tag: latest

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: mem0-mcp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

env:
  # HTTP listen port used by the streamable MCP endpoint.
  PORT: "8081"

  # # Default user_id injected into Mem0 filters/writes when callers do not provide one.
  # MEM0_DEFAULT_USER_ID: mem0-mcp

  # # Enable graph memories by default. Keep false unless graph behavior is desired broadly.
  # MEM0_ENABLE_GRAPH_DEFAULT: "false"

  # # Required secret-backed env example.
  # # The env map supports both of these forms:
  # #
  # #   PLAIN_ENV: "value"
  # #
  # #   SECRET_ENV:
  # #     secretName: my-secret
  # #     secretKey: SECRET_ENV
  # #
  # # Upstream mem0-mcp also documents these optional env vars:
  # # - MEM0_MCP_AGENT_MODEL: model for the bundled example agent
  # # - HOST: bind address override for the HTTP entrypoint
  # MEM0_API_KEY:
  #   secretName: secret-mem0-env
  #   secretKey: MEM0_API_KEY

# Additional explicit env items appended after the env map above.
extraEnv: []

# Additional envFrom sources (Secret/ConfigMap refs).
extraEnvFrom: []

livenessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3

readinessProbe:
  tcpSocket:
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 3
