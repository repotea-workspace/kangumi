apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "obsidian-fns.fullname" . }}-test-connection"
  labels:
    {{- include "obsidian-fns.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox
      command: ["wget"]
      args: ["-qO-", "http://{{ include "obsidian-fns.fullname" . }}:{{ .Values.service.port }}/api/health"]
  restartPolicy: Never
