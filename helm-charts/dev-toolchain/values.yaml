# Default values for dev-toolchain.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global settings
global:
  # Image registry (can be overridden per toolchain)
  imageRegistry: ghcr.io
  # Default image pull policy
  imagePullPolicy: Always
  # Image pull secrets for private registries
  imagePullSecrets: []
  # Example:
  # imagePullSecrets:
  #   - name: ghcr-secret

# Toolchain instances configuration
# Each entry creates a separate deployment with its own PVC and services
toolchains: {}
  # ---------------------------------------------------------------------------
  # Example toolchain instances (commented out - uncomment and customize to use)
  # ---------------------------------------------------------------------------
  #
  # foo:
  #   enabled: true
  #
  #   hostname: tch-foo
  #
  #   image: repotea-workspace/kangumi/dev-toolchain:latest
  #   # imageRegistry: ghcr.io
  #   # imagePullPolicy: Always
  #
  #   machineId: ""
  #
  #   # SSH Configuration
  #   # sshConfig:
  #   #   root:
  #   #     authorized_keys: |
  #   #       ssh-ed25519 AAAAC3Nza... user@hostname
  #   #     id_ed25519:
  #   #       secretRef:
  #   #         name: my-ssh-private-keys
  #   #         key: root_id_ed25519
  #   #     id_ed25519.pub: |
  #   #       ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIAbCdE... root@hostname
  #   sshConfig: {}
  #
  #   network:
  #     mode: nodePort        # or: hostNetwork
  #     dnsPolicy: ClusterFirstWithHostNet
  #
  #   devTools:
  #     autoInstall: false
  #     packages: []
  #     # packages:
  #     #   - golang
  #     #   - nodejs
  #     #   - name: fvm
  #     #     tap: leoafarias/fvm
  #     #     formula: fvm
  #
  #   userScripts: {}
  #   # Use an existing ConfigMap instead of generating one from inline userScripts.
  #   # The ConfigMap data keys should be script filenames, mounted under
  #   # /usr/local/lib/dev-tools/user-scripts.
  #   userScriptsConfigMapName: ""
  #   # userScripts:
  #   #   00-setup-env.sh: |
  #   #     #!/bin/bash
  #   #     echo 'export MY_VAR=value' >> /etc/profile.d/99-dev-tools-env.sh
  #   #   10-configure-git.sh: |
  #   #     #!/bin/bash
  #   #     git config --global user.name "Your Name"
  #   #     git config --global user.email "your@email.com"
  #
  #   ports:
  #     ssh:
  #       containerPort: 22
  #       nodePort: 17000
  #     extra: []
  #     # extra:
  #     #   - name: http
  #     #     containerPort: 8080
  #     #     nodePort: 17100
  #     #     protocol: TCP
  #
  #   storage:
  #     pvc:
  #       enabled: true
  #       name: ""
  #       storageClassName: ""
  #       size: 100Gi
  #       accessMode: ReadWriteOnce
  #     volumes: {}
  #     # volumes:
  #     #   root:
  #     #     mountPath: /root
  #     #     subPath: home/root
  #     #   code:
  #     #     mountPath: /code
  #     #     subPath: workspace/code
  #     sharedPVC:
  #       enabled: false
  #       name: dev-shared-wwwroot
  #       storageClassName: ""
  #       size: 50Gi
  #       accessMode: ReadWriteMany
  #       mountPath: /data/wwwroot
  #
  #   resources:
  #     limits:
  #       cpu: "8"
  #       memory: 32Gi
  #     requests:
  #       cpu: "2"
  #       memory: 4Gi
  #
  #   env: []
  #   # env:
  #   #   - name: TZ
  #   #     value: Asia/Shanghai
  #   #   - name: LANG
  #   #     value: en_US.UTF-8
  #
  #   nodeSelector: {}
  #   tolerations: []
  #   affinity: {}

# Default DinD configuration (DEPRECATED - all settings kept for backward compatibility only)
# dockerd now runs in the main container via s6-overlay service, not as a sidecar
# These settings have no effect and will be removed in a future version
dindDefaults:
  image: docker:29-dind # Deprecated
  pullPolicy: IfNotPresent # Deprecated
  env:
    DOCKER_TLS_CERTDIR: "" # Deprecated
  resources: # Deprecated
    limits:
      cpu: "4"
      memory: 8Gi
    requests:
      cpu: "1"
      memory: 2Gi

# Service account configuration
serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext: {}
  # fsGroup: 2000

# Security context for main container
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# Liveness probe configuration (optional)
livenessProbe:
  enabled: false
  # exec:
  #   command:
  #     - /bin/sh
  #     - -c
  #     - pgrep sshd
  # initialDelaySeconds: 30
  # periodSeconds: 10
  # timeoutSeconds: 5
  # failureThreshold: 3

# Readiness probe configuration (optional)
readinessProbe:
  enabled: false
  # tcpSocket:
  #   port: 22
  # initialDelaySeconds: 10
  # periodSeconds: 5
  # timeoutSeconds: 3
  # failureThreshold: 3
