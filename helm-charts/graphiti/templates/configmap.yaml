apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "graphiti.fullname" . }}-config
  labels:
    {{- include "graphiti.labels" . | nindent 4 }}
data:
  config.yaml: |
    server:
      transport: "http"
      host: "0.0.0.0"
      port: {{ .Values.service.port }}

    llm:
      provider: {{ .Values.graphiti.config.llm.provider | quote }}
      model: {{ .Values.graphiti.config.llm.model | quote }}
      max_tokens: {{ .Values.graphiti.config.llm.maxTokens }}
      providers:
        openai:
          api_key: "${OPENAI_API_KEY}"
          api_url: {{ .Values.graphiti.config.llm.apiBase | default "https://api.openai.com/v1" | quote }}
          organization_id: "${OPENAI_ORGANIZATION_ID:}"

    embedder:
      provider: {{ .Values.graphiti.config.embedder.provider | quote }}
      model: {{ .Values.graphiti.config.embedder.model | quote }}
      dimensions: {{ .Values.graphiti.config.embedder.dimensions }}
      providers:
        openai:
          api_key: "${OPENAI_API_KEY}"
          api_url: {{ .Values.graphiti.config.embedder.apiBase | default "https://api.openai.com/v1" | quote }}
          organization_id: "${OPENAI_ORGANIZATION_ID:}"

    database:
      provider: {{ .Values.graphiti.config.database | quote }}
      providers:
        neo4j:
          uri: "${NEO4J_URI}"
          username: "${NEO4J_USER}"
          password: "${NEO4J_PASSWORD}"
          database: "${NEO4J_DATABASE:neo4j}"
