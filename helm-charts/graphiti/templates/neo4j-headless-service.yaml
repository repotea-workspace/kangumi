{{- if .Values.neo4j.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "graphiti.neo4jHeadlessName" . }}
  labels:
    {{- include "graphiti.neo4jLabels" . | nindent 4 }}
spec:
  clusterIP: None
  ports:
    - port: {{ .Values.neo4j.service.boltPort }}
      targetPort: bolt
      protocol: TCP
      name: bolt
  selector:
    {{- include "graphiti.neo4jSelectorLabels" . | nindent 4 }}
{{- end }}
