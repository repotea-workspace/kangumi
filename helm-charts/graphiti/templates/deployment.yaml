apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "graphiti.fullname" . }}
  labels:
    {{- include "graphiti.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "graphiti.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "graphiti.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "graphiti.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: graphiti-mcp
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: {{ include "graphiti.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: NEO4J_URI
              value: "bolt://{{ include "graphiti.neo4jName" . }}:{{ .Values.neo4j.service.boltPort }}"
            - name: NEO4J_USER
              value: {{ .Values.neo4j.auth.user | quote }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ required "neo4j.auth.existingSecret is required" .Values.neo4j.auth.existingSecret }}
                  key: {{ .Values.neo4j.auth.passwordKey }}
            - name: NEO4J_DATABASE
              value: {{ .Values.neo4j.database | quote }}
            - name: GRAPHITI_GROUP_ID
              value: {{ .Values.graphiti.groupId | quote }}
            - name: SEMAPHORE_LIMIT
              value: {{ .Values.graphiti.semaphoreLimit | quote }}
            {{- range $k, $v := .Values.env }}
            {{- if and (kindIs "map" $v) (hasKey $v "secretName") (hasKey $v "secretKey") }}
            - name: {{ $k }}
              valueFrom:
                secretKeyRef:
                  name: {{ $v.secretName }}
                  key: {{ $v.secretKey }}
            {{- else }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnvFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: graphiti-config
              mountPath: /app/mcp/config/config.yaml
              subPath: config.yaml
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- if eq (include "graphiti.authProxyEnabled" .) "true" }}
        - name: auth-proxy
          image: "{{ .Values.authProxy.image.repository }}:{{ .Values.authProxy.image.tag }}"
          imagePullPolicy: {{ .Values.authProxy.image.pullPolicy }}
          ports:
            - name: auth-proxy
              containerPort: {{ .Values.authProxy.port }}
              protocol: TCP
          env:
            - name: NGINX_ENVSUBST_FILTER
              value: {{ printf "(%s|GRAPHITI_BACKEND_PORT)" .Values.ingress.auth.tokenEnvName | quote }}
            - name: GRAPHITI_BACKEND_PORT
              value: {{ .Values.service.port | quote }}
            - name: {{ .Values.ingress.auth.tokenEnvName }}
              valueFrom:
                secretKeyRef:
                  name: {{ required "ingress.auth.existingSecret is required when ingress auth is enabled" .Values.ingress.auth.existingSecret }}
                  key: {{ .Values.ingress.auth.secretKey }}
          volumeMounts:
            - name: auth-proxy-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
        {{- end }}
      volumes:
        - name: graphiti-config
          configMap:
            name: {{ include "graphiti.fullname" . }}-config
        {{- if eq (include "graphiti.authProxyEnabled" .) "true" }}
        - name: auth-proxy-config
          configMap:
            name: {{ include "graphiti.fullname" . }}-auth-proxy
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
